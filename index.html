<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soul Forge: The Aqua Protocol</title>
  
  <!-- Use ESM versions of React -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>
  
  <!-- Babel standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- JSZip for .spark.zip generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <style>
    :root {
      --aqua-bg: #001a33;
      --aqua-gradient: linear-gradient(180deg, #003366 0%, #001a33 100%);
      --aqua-text: #e0f2f1;
      --aqua-gold: #c8972a;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--aqua-bg);
      background: var(--aqua-gradient);
      color: var(--aqua-text);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 20px;
      color: var(--aqua-gold);
      text-shadow: 0 0 10px rgba(200,151,42,0.5);
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">🌊 Hydrating the Aqua Protocol...</div>
  </div>
  
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';

    if (!window.storage) {
      window.storage = {
        async get(key) {
          const val = localStorage.getItem(key);
          return val ? { value: val } : null;
        },
        async set(key, value) {
          localStorage.setItem(key, value);
        }
      };
    }

    async function loadApp() {
      try {
        const res = await fetch('./soul-forge.jsx');
        if (!res.ok) throw new Error('Failed to fetch soul-forge.jsx');
        const jsxCode = await res.text();
        const transformed = Babel.transform(jsxCode, {
          presets: [['react', { runtime: 'automatic' }]]
        }).code;
        const blob = new Blob([transformed], { type: 'application/javascript' });
        const moduleUrl = URL.createObjectURL(blob);
        const { default: SoulForge } = await import(moduleUrl);
        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(SoulForge));
        URL.revokeObjectURL(moduleUrl);
      } catch (err) {
        console.error(err);
        document.getElementById('root').innerHTML = `<div style="padding: 20px; color: #ff6b6b;">Error: ${err.message}</div>`;
      }
    }
    loadApp();
  </script>
</body>
</html>
